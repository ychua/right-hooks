name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or workflow gap
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - Hooks (enforcement)
        - CLI (commands)
        - Multi-runtime (Codex, Cursor, etc.)
        - Documentation
        - Other
    validations:
      required: true
