name: Bug Report
description: Report a bug in Right Hooks
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1. Run `npx right-hooks ...`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Right Hooks version
      placeholder: "npx right-hooks version"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
    validations:
      required: true
